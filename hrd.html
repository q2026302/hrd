<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>数字华容道</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #8b7a62;
            background-image: radial-gradient(circle at 30% 30%, #b8a78f, #6b5b47);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Sans MS', 'Chalkboard', cursive, sans-serif;
            margin: 0;
            padding: 16px;
        }
        
        .game-container {
            background: #c9a87c;
            background-image: linear-gradient(145deg, #e0c09c, #b48b54);
            border-radius: 70px 70px 50px 50px;
            padding: 30px 25px 25px 25px;
            box-shadow: 0 15px 0 #7b5f3a, 0 25px 35px rgba(0,0,0,0.4), inset 0 2px 15px rgba(255,240,200,0.8);
            border: 4px solid #9b7b4c;
            max-width: 750px;
            width: 100%;
            position: relative;
        }
        
        .game-container::after {
            content: "";
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border-radius: 55px;
            background: repeating-linear-gradient(45deg, rgba(160,130,90,0.15) 0px, rgba(160,130,90,0.15) 8px, rgba(130,100,60,0.15) 8px, rgba(130,100,60,0.15) 16px);
            pointer-events: none;
            z-index: 0;
        }
        
        .main-layout {
            display: flex;
            gap: 25px;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }
        
        .left-section {
            flex: 1;
            min-width: 320px;
            display: flex;
            justify-content: center;
            background: #b28b5a;
            background: radial-gradient(circle at 50% 30%, #dbb88c, #9e7a4c);
            padding: 20px 15px;
            border-radius: 45px 45px 35px 35px;
            box-shadow: inset 0 -8px 0 #6f5436, inset 0 8px 15px #efdbb0, 0 12px 18px rgba(0,0,0,0.4);
            border: 4px solid #7b5f3a;
            position: relative;
        }
        
        .left-section::before {
            content: "";
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            bottom: 6px;
            border-radius: 35px;
            border: 2px dashed #a58354;
            opacity: 0.4;
            pointer-events: none;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: #7d6542;
            padding: 4px;
            border-radius: 20px;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 300px;
            box-shadow: inset 0 0 0 2px #5f482c, inset 0 4px 8px #4f3f28;
        }
        
        .tile {
            background: #e8cfaa;
            background: radial-gradient(circle at 30% 30%, #f8e2c0, #cbad7a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #4a3722;
            text-shadow: 0 2px 3px rgba(255,255,240,0.8);
            font-family: 'Segoe UI', 'Comic Sans MS', cursive;
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 0 #8f6f44, 0 4px 6px rgba(0,0,0,0.2), inset 0 -2px 3px rgba(255,255,240,0.7), inset 0 2px 4px #fff6e5;
            border: 1px solid #b38f5a;
            cursor: grab;
            transition: all 0.1s ease;
        }
        
        .tile::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border-radius: 6px;
            background: repeating-linear-gradient(45deg, rgba(200,160,110,0.2) 0px, rgba(200,160,110,0.2) 4px, rgba(170,130,80,0.2) 4px, rgba(170,130,80,0.2) 8px);
            pointer-events: none;
        }
        
        .tile:active {
            cursor: grabbing;
            transform: scale(0.96);
            box-shadow: 0 1px 0 #8f6f44, 0 3px 5px rgba(0,0,0,0.2);
        }
        
        .tile.dragging {
            opacity: 0.8;
            transform: scale(0.94);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            z-index: 10;
        }
        
        .tile.empty {
            background: transparent;
            box-shadow: none;
            border: none;
            cursor: default;
            pointer-events: none;
        }
        
        .tile.empty::after {
            display: none;
        }
        
        .right-section {
            flex: 1;
            min-width: 240px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        
        .control-panel {
            background: #cbab7c;
            background: linear-gradient(145deg, #e2c69e, #ba975f);
            border-radius: 40px 40px 30px 30px;
            padding: 20px 15px;
            box-shadow: inset 0 -8px 0 #8b6f42, 0 10px 15px rgba(0,0,0,0.3), inset 0 2px 10px #ffeecc;
            border: 4px solid #9f7d4c;
        }
        
        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .button-row:last-child {
            margin-bottom: 0;
        }
        
        button, .dropdown-btn {
            background: #e8cfaa;
            background: radial-gradient(circle at 30% 30%, #f8e2c0, #cbad7a);
            border: none;
            padding: 10px 6px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            color: #4a3722;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 0 #8f6f44, 0 6px 10px rgba(0,0,0,0.25), inset 0 -2px 4px #ffeecc;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex: 1;
            min-width: 75px;
            border: 2px solid #b38f5a;
            font-family: 'Segoe UI', 'Comic Sans MS', cursive;
            transition: all 0.08s ease;
            position: relative;
        }
        
        button::after, .dropdown-btn::after {
            content: "";
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            border-radius: 25px;
            background: repeating-linear-gradient(45deg, rgba(200,160,110,0.2) 0px, rgba(200,160,110,0.2) 4px, rgba(170,130,80,0.2) 4px, rgba(170,130,80,0.2) 8px);
            pointer-events: none;
        }
        
        button:active, .dropdown-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #8f6f44, 0 5px 8px rgba(0,0,0,0.2);
        }
        
        .dropdown {
            position: relative;
            flex: 1;
        }
        
        .dropdown-btn {
            width: 100%;
            justify-content: space-between;
        }
        
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #e8cfaa;
            border-radius: 25px;
            margin-top: 8px;
            box-shadow: 0 8px 0 #8f6f44, 0 12px 20px rgba(0,0,0,0.4);
            z-index: 100;
            overflow: hidden;
            border: 2px solid #b38f5a;
        }
        
        .dropdown-content.show {
            display: block;
        }
        
        .dropdown-item {
            padding: 10px 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: #4a3722;
            border-bottom: 2px solid #b38f5a;
            transition: 0.1s;
            background: #f8e2c0;
        }
        
        .dropdown-item:last-child {
            border-bottom: none;
        }
        
        .dropdown-item:hover {
            background: #ecdbbf;
        }
        
        .dropdown-item.selected {
            background: #c5d9a8;
            font-weight: 600;
        }
        
        .info-panel {
            background: #cbab7c;
            background: linear-gradient(145deg, #e2c69e, #ba975f);
            border-radius: 35px 35px 25px 25px;
            padding: 15px;
            box-shadow: inset 0 -6px 0 #8b6f42, 0 10px 15px rgba(0,0,0,0.3), inset 0 2px 8px #ffeecc;
            border: 4px solid #9f7d4c;
            min-height: 250px;
            display: flex;
            flex-direction: column;
        }
        
        .move-record {
            background: #f8e2c0;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 10px;
            border: 2px solid #b38f5a;
            box-shadow: inset 0 2px 5px #8b6f42;
            max-height: 100px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .move-item {
            padding: 4px 8px;
            background: #e8cfaa;
            border-radius: 15px;
            font-size: 0.9rem;
            border: 1px solid #b38f5a;
            display: inline-block;
        }
        
        .move-item.current {
            background: #ffb87a;
            font-weight: 600;
        }
        
        .steps-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .steps-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #4a3722;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .steps-count {
            background: #f8e2c0;
            padding: 5px 12px;
            border-radius: 25px;
            font-size: 1rem;
            box-shadow: inset 0 2px 5px #9f7d4c, 0 3px 0 #8f6f44;
            border: 2px solid #b38f5a;
        }
        
        .steps-nav {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        
        .steps-nav button {
            min-width: 45px;
            padding: 5px 6px;
            font-size: 0.85rem;
            box-shadow: 0 4px 0 #8f6f44;
        }
        
        .steps-nav span {
            font-size: 0.9rem;
            background: #f8e2c0;
            padding: 4px 8px;
            border-radius: 25px;
            color: #4a3722;
            border: 2px solid #b38f5a;
            box-shadow: inset 0 2px 4px #9f7d4c;
        }
        
        .steps-list {
            background: #f0dbb8;
            border-radius: 20px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            border: 2px solid #b38f5a;
            box-shadow: inset 0 2px 8px #8b6f42;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
            align-items: center;
        }
        
        .step-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 2px solid;
            cursor: pointer;
            transition: 0.1s;
            font-family: 'Courier New', monospace;
            min-width: 45px;
            text-align: center;
        }
        
        .step-badge.start {
            background: #f8e2c0;
            color: #4a3722;
            border-color: #b38f5a;
            font-size: 0.8rem;
        }
        
        .step-badge.start.current {
            background: #ffb87a;
            border-color: #d97c2b;
            font-weight: 700;
            box-shadow: 0 0 0 2px #ffe0a0;
        }
        
        .step-badge.executed {
            background: #c5d9a8;
            color: #2d5a2d;
            border-color: #5a8f5a;
        }
        
        .step-badge.pending {
            background: #b8c9e6;
            color: #2d4a6d;
            border-color: #4a7a9f;
        }
        
        .step-badge.current {
            background: #ffb87a;
            color: #4d3e2b;
            border-color: #d97c2b;
            font-weight: 700;
            box-shadow: 0 0 0 2px #ffe0a0;
        }
        
        .empty-message {
            color: #7e6b55;
            text-align: center;
            padding: 20px;
            font-style: italic;
            background: #f8e2c0;
            border-radius: 20px;
            border: 2px solid #b38f5a;
        }
        
        /* 弹窗样式优化 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: #f5e6d3;
            background: linear-gradient(145deg, #faefdf, #e8d2b5);
            border-radius: 60px 60px 40px 40px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 15px 0 #b4915c, 0 25px 35px rgba(0,0,0,0.4), inset 0 2px 12px #fff6e5;
            border: 4px solid #c9a87c;
        }
        
        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #5a3e2a;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 2px 4px #ffefd0;
        }
        
        .modal-hint {
            color: #5a3e2a;
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: center;
            background: #f8e2c0;
            padding: 10px;
            border-radius: 40px;
            border: 2px solid #b38f5a;
            box-shadow: inset 0 2px 6px #a58354;
        }
        
        .modal-hint span {
            display: inline-block;
            background: #7d6542;
            color: #f8e2c0;
            padding: 2px 10px;
            border-radius: 20px;
            margin: 0 4px;
        }
        
        .modal-input-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .modal-input-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .modal-input-cell {
            width: 65px;
            height: 65px;
            background: #f8ede0;
            border: 3px solid #b38f5a;
            border-radius: 20px;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #5a3e2a;
            box-shadow: inset 0 3px 8px #b38f5a, 0 5px 0 #8f6f44;
            outline: none;
            transition: all 0.1s ease;
        }
        
        .modal-input-cell::placeholder {
            color: #c0a582;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        .modal-input-cell:focus {
            border-color: #e6a345;
            background: #fff3dd;
            transform: scale(1.02);
        }
        
        .modal-input-cell.invalid {
            border-color: #d45a5a;
            background: #ffe8e8;
            box-shadow: inset 0 3px 8px #d45a5a, 0 5px 0 #a55a5a;
        }
        
        .modal-error {
            background: #d45a5a;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            margin: 0 0 20px 0;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            border: 2px solid #a54242;
            box-shadow: 0 5px 0 #7a3a3a, inset 0 2px 8px #ffb0b0;
            display: none;
        }
        
        .modal-error.show {
            display: block;
            animation: shake 0.3s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .modal-buttons button {
            min-width: 110px;
            padding: 12px 15px;
            font-size: 1.1rem;
            box-shadow: 0 6px 0 #8f6f44;
        }
        
        .modal-confirm {
            background: #c5d9a8 !important;
            color: #2d5a2d !important;
        }
        
        .modal-cancel {
            background: #f0b8b8 !important;
            color: #a54242 !important;
        }
        
        .modal-buttons button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #8f6f44;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="main-layout">
        <div class="left-section">
            <div class="board" id="board"></div>
        </div>

        <div class="right-section">
            <div class="control-panel">
                <div class="button-row">
                    <div class="dropdown" id="randomDropdown">
                        <button class="dropdown-btn" id="randomBtn">
                            <span>🎲 随机</span>
                            <span style="font-size: 0.8rem;">▼</span>
                        </button>
                        <div class="dropdown-content" id="randomDropdownContent">
                            <div class="dropdown-item" data-mode="random">🎲 完全随机</div>
                            <div class="dropdown-item" data-mode="easy">🌟 简单开局</div>
                            <div class="dropdown-item" data-mode="hard">🔥 困难开局</div>
                        </div>
                    </div>
                    <button id="manualBtn">✏️ 手动</button>
                </div>
                <div class="button-row">
                    <button id="solveBtn">⚡ 求解</button>
                    <button id="resetBtn">🔄 重置</button>
                </div>
            </div>

            <div class="info-panel" id="infoPanel">
                <div class="move-record" id="moveRecord">暂无移动记录</div>
                <div class="steps-container" id="stepsContainer">
                    <div class="empty-message">点击求解查看步骤</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 手动输入弹窗 -->
<div id="inputModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-title">✏️ 手动输入</div>
        <div class="modal-hint">
            <span>空</span> 表示空格，也可输入 <span>0</span>
        </div>
        <div class="modal-error" id="modalError">
            ⚠️ 输入无效！必须包含数字1-8各一次，且有一个空格
        </div>
        <div class="modal-input-grid" id="modalInputGrid"></div>
        <div class="modal-buttons">
            <button class="modal-cancel" id="modalCancelBtn">取消</button>
            <button class="modal-confirm" id="modalConfirmBtn">应用</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const BOARD_SIZE = 3;
        const TOTAL_TILES = 9;
        const EMPTY_VALUE = 9;
        const GOAL_STATE = [1, 2, 3, 4, 5, 6, 7, 8, 9];

        let currentBoard = [...GOAL_STATE];
        let goalBoard = [...GOAL_STATE];
        let initialBoard = [...GOAL_STATE];
        
        // 移动记录
        let moveHistory = [];
        let moveDirections = [];
        
        // 求解相关
        let solutionMoves = [];
        let solutionDetails = [];
        let currentStepIndex = -1;
        let hasSolution = false;
        
        // 当前随机模式
        let currentRandomMode = 'random';
        
        // 拖动相关
        let isDragging = false;
        let dragStartIndex = -1;
        let dragStartX = 0;
        let dragStartY = 0;

        // DOM 元素
        const boardEl = document.getElementById('board');
        const moveRecord = document.getElementById('moveRecord');
        const stepsContainer = document.getElementById('stepsContainer');
        
        const randomBtn = document.getElementById('randomBtn');
        const randomDropdown = document.getElementById('randomDropdown');
        const randomDropdownContent = document.getElementById('randomDropdownContent');
        const dropdownItems = document.querySelectorAll('.dropdown-item');
        
        const manualBtn = document.getElementById('manualBtn');
        const solveBtn = document.getElementById('solveBtn');
        const resetBtn = document.getElementById('resetBtn');

        // 弹窗元素
        const modal = document.getElementById('inputModal');
        const modalInputGrid = document.getElementById('modalInputGrid');
        const modalError = document.getElementById('modalError');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');

        // 辅助函数
        function idxToRowCol(idx) {
            return { row: Math.floor(idx / 3), col: idx % 3 };
        }
        function rowColToIdx(row, col) {
            return row * 3 + col;
        }
        function findEmptyIndex(board) {
            return board.indexOf(EMPTY_VALUE);
        }
        function copyBoard(board) {
            return board.slice();
        }
        function boardsEqual(b1, b2) {
            return b1.every((v, i) => v === b2[i]);
        }

        // 可解性检查
        function isSolvable(board) {
            let linear = board.map(v => v === 9 ? 0 : v);
            let invCount = 0;
            for (let i = 0; i < 9; i++) {
                if (linear[i] === 0) continue;
                for (let j = i + 1; j < 9; j++) {
                    if (linear[j] === 0) continue;
                    if (linear[i] > linear[j]) invCount++;
                }
            }
            return invCount % 2 === 0;
        }

        // 方向转换
        function getMoveDirection(fromIdx, toIdx) {
            const from = idxToRowCol(fromIdx);
            const to = idxToRowCol(toIdx);
            if (to.row - from.row === 1) return '↓';
            if (to.row - from.row === -1) return '↑';
            if (to.col - from.col === 1) return '→';
            if (to.col - from.col === -1) return '←';
            return '?';
        }

        // 检查移动是否与求解步骤匹配
        function isMoveMatchingSolution(movedNumber, direction) {
            if (!hasSolution || currentStepIndex >= solutionMoves.length - 1) return false;
            
            const nextStepIndex = currentStepIndex + 1;
            if (nextStepIndex >= solutionDetails.length) return false;
            
            const expectedStep = solutionDetails[nextStepIndex];
            return expectedStep.number === movedNumber && expectedStep.directionChar === direction;
        }

        // 清除求解结果
        function clearSolution() {
            hasSolution = false;
            solutionMoves = [];
            solutionDetails = [];
            currentStepIndex = -1;
            updateStepsDisplay();
        }

        // 更新显示
        function updateDisplay() {
            renderBoard();
            updateMoveRecord();
            updateStepsDisplay();
        }

        // 渲染棋盘
        function renderBoard() {
            let html = '';
            for (let i = 0; i < TOTAL_TILES; i++) {
                const value = currentBoard[i];
                const isEmpty = (value === EMPTY_VALUE);
                const numberText = isEmpty ? '' : value;
                html += `<div class="tile ${isEmpty ? 'empty' : ''}" data-index="${i}">${numberText}</div>`;
            }
            boardEl.innerHTML = html;
            
            const tiles = document.querySelectorAll('.tile:not(.empty)');
            tiles.forEach(tile => {
                tile.addEventListener('mousedown', startDrag);
                tile.addEventListener('click', handleClick);
            });
        }

        // 点击处理
        function handleClick(e) {
            if (isDragging) return;
            const tile = e.currentTarget;
            const index = parseInt(tile.dataset.index);
            const emptyIdx = findEmptyIndex(currentBoard);
            
            const fromRowCol = idxToRowCol(index);
            const emptyRowCol = idxToRowCol(emptyIdx);
            const rowDiff = Math.abs(fromRowCol.row - emptyRowCol.row);
            const colDiff = Math.abs(fromRowCol.col - emptyRowCol.col);
            const isAdjacent = (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
            
            if (isAdjacent) {
                performMove(index, emptyIdx);
            }
        }

        // 拖动开始
        function startDrag(e) {
            if (e.button !== 0) return;
            e.preventDefault();
            
            const tile = e.currentTarget;
            dragStartIndex = parseInt(tile.dataset.index);
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            isDragging = true;
            
            tile.classList.add('dragging');
            
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', endDrag);
        }

        // 拖动中
        function onDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                const tile = document.querySelector(`.tile[data-index="${dragStartIndex}"]`);
                if (tile) {
                    tile.style.transform = `translate(${dx}px, ${dy}px) scale(0.96)`;
                }
            }
        }

        // 拖动结束
        function endDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            const startTile = document.querySelector(`.tile[data-index="${dragStartIndex}"]`);
            if (startTile) {
                startTile.style.transform = '';
                startTile.classList.remove('dragging');
            }
            
            const elementsAtCursor = document.elementsFromPoint(e.clientX, e.clientY);
            let targetTile = null;
            
            for (const el of elementsAtCursor) {
                if (el.classList && el.classList.contains('tile')) {
                    targetTile = el;
                    break;
                }
            }
            
            if (targetTile) {
                const targetIndex = parseInt(targetTile.dataset.index);
                const emptyIdx = findEmptyIndex(currentBoard);
                
                if (targetIndex === emptyIdx) {
                    performMove(dragStartIndex, emptyIdx);
                }
            }
            
            isDragging = false;
            dragStartIndex = -1;
            
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', endDrag);
        }

        // 执行移动
        function performMove(fromIdx, toIdx) {
            if (fromIdx === toIdx) return false;
            
            const emptyIdx = findEmptyIndex(currentBoard);
            if (toIdx !== emptyIdx) return false;
            
            const fromRowCol = idxToRowCol(fromIdx);
            const emptyRowCol = idxToRowCol(emptyIdx);
            
            const rowDiff = Math.abs(fromRowCol.row - emptyRowCol.row);
            const colDiff = Math.abs(fromRowCol.col - emptyRowCol.col);
            const isAdjacent = (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
            
            if (!isAdjacent) return false;
            
            // 执行移动
            const movedNumber = currentBoard[fromIdx];
            [currentBoard[fromIdx], currentBoard[emptyIdx]] = [currentBoard[emptyIdx], currentBoard[fromIdx]];
            
            // 记录移动
            const direction = getMoveDirection(fromIdx, emptyIdx);
            
            // 检查是否与求解步骤匹配
            if (hasSolution) {
                if (isMoveMatchingSolution(movedNumber, direction)) {
                    // 匹配成功，更新当前步骤
                    currentStepIndex++;
                } else {
                    // 不匹配，清除求解结果
                    clearSolution();
                }
            }
            
            // 记录到移动历史
            moveHistory.push(movedNumber);
            moveDirections.push(direction);
            
            updateDisplay();
            return true;
        }

        // 更新移动记录
        function updateMoveRecord() {
            if (moveHistory.length === 0) {
                moveRecord.innerHTML = '<div style="text-align:center; color:#7e6b55;">暂无移动记录</div>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < moveHistory.length; i++) {
                const isCurrent = (i === moveHistory.length - 1);
                html += `<div class="move-item ${isCurrent ? 'current' : ''}">${moveHistory[i]}${moveDirections[i]}</div>`;
            }
            moveRecord.innerHTML = html;
        }

        // 更新步骤显示
        function updateStepsDisplay() {
            if (!hasSolution || solutionMoves.length === 0 || solutionDetails.length === 0) {
                stepsContainer.innerHTML = '<div class="empty-message">点击求解查看步骤</div>';
                return;
            }
            
            const totalSteps = solutionMoves.length;
            let html = '';
            
            html += '<div class="steps-header">';
            html += '<div class="steps-count">📋 求解步骤 ' + totalSteps + '</div>';
            html += '<div class="steps-nav">';
            html += '<button id="prevStepBtn" ' + (currentStepIndex <= -1 ? 'disabled' : '') + '>◀ 上</button>';
            html += '<span id="stepPosition">' + (currentStepIndex === -1 ? '起' : (currentStepIndex + 1)) + '/' + totalSteps + '</span>';
            html += '<button id="nextStepBtn" ' + (currentStepIndex >= totalSteps - 1 ? 'disabled' : '') + '>下 ▶</button>';
            html += '</div>';
            html += '</div>';
            
            html += '<div class="steps-list" id="stepsList">';
            html += `<div class="step-badge start ${currentStepIndex === -1 ? 'current' : ''}" data-step-index="-1" title="起点">起</div>`;
            
            for (let i = 0; i < solutionDetails.length; i++) {
                const detail = solutionDetails[i];
                let statusClass = '';
                if (i === currentStepIndex) {
                    statusClass = 'current';
                } else if (i < currentStepIndex) {
                    statusClass = 'executed';
                } else {
                    statusClass = 'pending';
                }
                html += `<div class="step-badge ${statusClass}" data-step-index="${i}" title="第${i+1}步：移动数字 ${detail.number}${detail.directionChar}">${detail.number}${detail.directionChar}</div>`;
            }
            html += '</div>';
            
            stepsContainer.innerHTML = html;
            
            document.getElementById('prevStepBtn')?.addEventListener('click', prevStep);
            document.getElementById('nextStepBtn')?.addEventListener('click', nextStep);
            
            document.querySelectorAll('.step-badge').forEach(badge => {
                badge.addEventListener('click', function() {
                    const index = parseInt(this.dataset.stepIndex);
                    if (!isNaN(index)) {
                        jumpToStep(index);
                    }
                });
            });
        }

        // 步骤操作
        function jumpToStep(stepIndex) {
            if (!hasSolution || solutionMoves.length === 0) return;
            if (stepIndex < -1 || stepIndex >= solutionMoves.length) return;
            
            if (stepIndex === -1) {
                currentBoard = copyBoard(initialBoard);
                moveHistory = [];
                moveDirections = [];
                currentStepIndex = -1;
                updateDisplay();
                return;
            }
            
            let tempBoard = copyBoard(initialBoard);
            let tempHistory = [];
            let tempDirections = [];
            
            for (let i = 0; i <= stepIndex; i++) {
                const dir = solutionMoves[i];
                const emptyIdx = findEmptyIndex(tempBoard);
                const moveResult = applyMove(tempBoard, emptyIdx, dir);
                if (moveResult) {
                    tempBoard = moveResult.newBoard;
                    const movedNumber = getMovedNumber(initialBoard, solutionMoves, i);
                    const arrow = getArrowFromDirection(dir);
                    tempHistory.push(movedNumber);
                    tempDirections.push(arrow);
                }
            }
            
            currentBoard = tempBoard;
            moveHistory = tempHistory;
            moveDirections = tempDirections;
            currentStepIndex = stepIndex;
            
            updateDisplay();
        }

        // 辅助函数：获取移动的数字
        function getMovedNumber(startBoard, moves, step) {
            let tempBoard = copyBoard(startBoard);
            for (let i = 0; i <= step; i++) {
                const dir = moves[i];
                const emptyIdx = findEmptyIndex(tempBoard);
                const { row, col } = idxToRowCol(emptyIdx);
                let targetIdx;
                if (dir === 'up') targetIdx = rowColToIdx(row - 1, col);
                else if (dir === 'down') targetIdx = rowColToIdx(row + 1, col);
                else if (dir === 'left') targetIdx = rowColToIdx(row, col - 1);
                else targetIdx = rowColToIdx(row, col + 1);
                
                if (i === step) {
                    return tempBoard[targetIdx];
                }
                
                const moveResult = applyMove(tempBoard, emptyIdx, dir);
                if (moveResult) tempBoard = moveResult.newBoard;
            }
            return '?';
        }

        // 辅助函数：方向转箭头
        function getArrowFromDirection(dir) {
            switch(dir) {
                case 'up': return '↓';
                case 'down': return '↑';
                case 'left': return '→';
                case 'right': return '←';
                default: return '?';
            }
        }

        function prevStep() {
            if (currentStepIndex > -1) {
                jumpToStep(currentStepIndex - 1);
            }
        }

        function nextStep() {
            if (currentStepIndex < solutionMoves.length - 1) {
                jumpToStep(currentStepIndex + 1);
            }
        }

        // 应用移动
        function applyMove(board, emptyIdx, direction) {
            const newBoard = copyBoard(board);
            const { row, col } = idxToRowCol(emptyIdx);
            let targetIdx = -1;
            if (direction === 'up' && row > 0) targetIdx = rowColToIdx(row - 1, col);
            else if (direction === 'down' && row < 2) targetIdx = rowColToIdx(row + 1, col);
            else if (direction === 'left' && col > 0) targetIdx = rowColToIdx(row, col - 1);
            else if (direction === 'right' && col < 2) targetIdx = rowColToIdx(row, col + 1);
            else return null;
            
            [newBoard[emptyIdx], newBoard[targetIdx]] = [newBoard[targetIdx], newBoard[emptyIdx]];
            return { newBoard, targetIdx };
        }

        // 求解器
        function manhattanDistance(board) {
            let distance = 0;
            for (let idx = 0; idx < TOTAL_TILES; idx++) {
                const value = board[idx];
                if (value === EMPTY_VALUE) continue;
                const targetIdx = value - 1;
                const currentRow = Math.floor(idx / 3);
                const currentCol = idx % 3;
                const targetRow = Math.floor(targetIdx / 3);
                const targetCol = targetIdx % 3;
                distance += Math.abs(currentRow - targetRow) + Math.abs(currentCol - targetCol);
            }
            return distance;
        }

        function aStarSolve(startBoard) {
            const startState = startBoard.join(',');
            const goalState = goalBoard.join(',');
            
            const openSet = [{ board: copyBoard(startBoard), moves: [], f: manhattanDistance(startBoard) }];
            const closedSet = new Set();
            
            while (openSet.length > 0) {
                openSet.sort((a, b) => a.f - b.f);
                const current = openSet.shift();
                const currentKey = current.board.join(',');
                
                if (closedSet.has(currentKey)) continue;
                closedSet.add(currentKey);
                
                if (currentKey === goalState) return current.moves;
                
                const emptyIdx = findEmptyIndex(current.board);
                const directions = ['up', 'down', 'left', 'right'];
                
                for (const dir of directions) {
                    const moveResult = applyMove(current.board, emptyIdx, dir);
                    if (!moveResult) continue;
                    
                    const neighborBoard = moveResult.newBoard;
                    const neighborKey = neighborBoard.join(',');
                    if (closedSet.has(neighborKey)) continue;
                    
                    const g = current.moves.length + 1;
                    const h = manhattanDistance(neighborBoard);
                    const f = g + h;
                    const newMoves = [...current.moves, dir];
                    openSet.push({ board: neighborBoard, moves: newMoves, f });
                }
            }
            return null;
        }

        // 生成步骤详情
        function generateStepDetails(startBoard, moves) {
            const details = [];
            let tempBoard = copyBoard(startBoard);
            
            for (let i = 0; i < moves.length; i++) {
                const dir = moves[i];
                const emptyIdx = findEmptyIndex(tempBoard);
                const { row, col } = idxToRowCol(emptyIdx);
                let targetIdx;
                if (dir === 'up') targetIdx = rowColToIdx(row - 1, col);
                else if (dir === 'down') targetIdx = rowColToIdx(row + 1, col);
                else if (dir === 'left') targetIdx = rowColToIdx(row, col - 1);
                else targetIdx = rowColToIdx(row, col + 1);
                
                const movedNumber = tempBoard[targetIdx];
                let arrow;
                if (dir === 'up') arrow = '↓';
                else if (dir === 'down') arrow = '↑';
                else if (dir === 'left') arrow = '→';
                else arrow = '←';
                
                details.push({
                    number: movedNumber,
                    directionChar: arrow
                });
                
                const moveResult = applyMove(tempBoard, emptyIdx, dir);
                if (moveResult) tempBoard = moveResult.newBoard;
            }
            return details;
        }

        // 设置新棋盘
        function setNewBoard(newBoard) {
            currentBoard = copyBoard(newBoard);
            initialBoard = copyBoard(newBoard);
            moveHistory = [];
            moveDirections = [];
            clearSolution();
            updateDisplay();
        }

        // 随机打乱
        function randomBoard(mode) {
            let board = copyBoard(goalBoard);
            
            if (mode === 'easy') {
                board = [1, 2, 3, 4, 5, 6, 7, 9, 8];
            } else if (mode === 'hard') {
                board = [8, 6, 7, 2, 5, 4, 3, 9, 1];
            } else {
                const moves = 150;
                let emptyIdx = findEmptyIndex(board);
                for (let step = 0; step < moves; step++) {
                    const neighbors = [];
                    const { row, col } = idxToRowCol(emptyIdx);
                    if (row > 0) neighbors.push(rowColToIdx(row - 1, col));
                    if (row < 2) neighbors.push(rowColToIdx(row + 1, col));
                    if (col > 0) neighbors.push(rowColToIdx(row, col - 1));
                    if (col < 2) neighbors.push(rowColToIdx(row, col + 1));
                    
                    const randomNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
                    [board[emptyIdx], board[randomNeighbor]] = [board[randomNeighbor], board[emptyIdx]];
                    emptyIdx = randomNeighbor;
                }
            }
            
            setNewBoard(board);
        }

        // 求解
        function solvePuzzle() {
            if (!isSolvable(currentBoard)) {
                alert('❌ 当前棋盘无解');
                return;
            }
            
            if (boardsEqual(currentBoard, goalBoard)) {
                alert('🎯 已经是完成状态');
                return;
            }
            
            solveBtn.disabled = true;
            
            setTimeout(() => {
                const moves = aStarSolve(currentBoard);
                
                if (moves && moves.length > 0) {
                    solutionMoves = moves;
                    initialBoard = copyBoard(currentBoard);
                    solutionDetails = generateStepDetails(initialBoard, moves);
                    currentStepIndex = -1;
                    hasSolution = true;
                    updateStepsDisplay();
                }
                
                solveBtn.disabled = false;
            }, 20);
        }

        // 重置
        function resetToInitial() {
            currentBoard = copyBoard(initialBoard);
            moveHistory = [];
            moveDirections = [];
            currentStepIndex = -1;
            updateDisplay();
        }

        // 弹窗输入
        function createModalInputFields() {
            let html = '';
            for (let r = 0; r < 3; r++) {
                html += '<div class="modal-input-row">';
                for (let c = 0; c < 3; c++) {
                    html += `<input type="text" class="modal-input-cell" id="modal_input_${r}_${c}" maxlength="1" placeholder="空">`;
                }
                html += '</div>';
            }
            modalInputGrid.innerHTML = html;
            
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    const input = document.getElementById(`modal_input_${r}_${c}`);
                    input.addEventListener('input', function(e) {
                        let val = this.value.trim();
                        if (val === '') {
                            this.classList.remove('invalid');
                            return;
                        }
                        val = val.slice(-1);
                        if (/[0-9]/.test(val)) {
                            let num = parseInt(val);
                            if (num === 0) {
                                this.value = '';
                            } else if (num >= 1 && num <= 8) {
                                this.value = num;
                            } else {
                                this.value = '';
                                this.classList.add('invalid');
                                return;
                            }
                            this.classList.remove('invalid');
                            
                            const next = getModalNextInput(r, c);
                            if (next) next.focus();
                        } else {
                            this.value = '';
                            this.classList.add('invalid');
                        }
                    });
                    
                    input.addEventListener('keydown', function(e) {
                        if (e.key === 'Backspace' && this.value === '') {
                            const prev = getModalPrevInput(r, c);
                            if (prev) prev.focus();
                        }
                    });
                }
            }
        }

        function getModalNextInput(row, col) {
            if (col < 2) return document.getElementById(`modal_input_${row}_${col+1}`);
            if (row < 2) return document.getElementById(`modal_input_${row+1}_0`);
            return null;
        }

        function getModalPrevInput(row, col) {
            if (col > 0) return document.getElementById(`modal_input_${row}_${col-1}`);
            if (row > 0) return document.getElementById(`modal_input_${row-1}_2`);
            return null;
        }

        function readModalInput() {
            let board = [];
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    const input = document.getElementById(`modal_input_${r}_${c}`);
                    let val = input.value.trim();
                    if (val === '') {
                        board.push(9);
                    } else {
                        let num = parseInt(val);
                        if (isNaN(num) || num < 1 || num > 8) return null;
                        board.push(num);
                    }
                }
            }
            
            const counts = new Array(10).fill(0);
            for (let v of board) counts[v]++;
            if (counts[9] !== 1) return null;
            for (let i = 1; i <= 8; i++) {
                if (counts[i] !== 1) return null;
            }
            return board;
        }

        function updateModalFields(board) {
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    const idx = r * 3 + c;
                    const val = board[idx];
                    const input = document.getElementById(`modal_input_${r}_${c}`);
                    if (val === 9) {
                        input.value = '';
                    } else {
                        input.value = val;
                    }
                    input.classList.remove('invalid');
                }
            }
        }

        function openModal() {
            updateModalFields(currentBoard);
            modalError.classList.remove('show');
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            modalError.classList.remove('show');
        }

        function showError() {
            modalError.classList.add('show');
            setTimeout(() => {
                modalError.classList.remove('show');
            }, 2000);
        }

        function applyModalInput() {
            const newBoard = readModalInput();
            if (newBoard) {
                setNewBoard(newBoard);
                closeModal();
            } else {
                showError();
            }
        }

        // 下拉菜单
        function toggleDropdown() {
            randomDropdownContent.classList.toggle('show');
        }

        function closeDropdown() {
            randomDropdownContent.classList.remove('show');
        }

        function selectMode(mode) {
            currentRandomMode = mode;
            dropdownItems.forEach(item => {
                if (item.dataset.mode === mode) item.classList.add('selected');
                else item.classList.remove('selected');
            });
            randomBoard(mode);
            closeDropdown();
        }

        // 事件绑定
        randomBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDropdown();
        });
        
        dropdownItems.forEach(item => {
            item.addEventListener('click', () => selectMode(item.dataset.mode));
        });
        
        document.addEventListener('click', (e) => {
            if (!randomDropdown.contains(e.target)) closeDropdown();
        });
        
        manualBtn.addEventListener('click', openModal);
        resetBtn.addEventListener('click', resetToInitial);
        solveBtn.addEventListener('click', solvePuzzle);
        
        modalCancelBtn.addEventListener('click', closeModal);
        modalConfirmBtn.addEventListener('click', applyModalInput);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('selectstart', (e) => e.preventDefault());

        // 初始化
        (function init() {
            createModalInputFields();
            randomBoard('random');
            dropdownItems.forEach(item => {
                if (item.dataset.mode === 'random') item.classList.add('selected');
            });
        })();

    })();
</script>
</body>
